# ============================================================
# GitHub Mirror – Apache VirtualHost configuration
# Replace docs.example.com with your actual domain
# ============================================================

# ---- HTTP → redirect to HTTPS ----
<VirtualHost *:80>
    ServerName docs.example.com
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ---- HTTPS ----
<VirtualHost *:443>
    ServerName docs.example.com
    DocumentRoot /var/www/html/docs

    # ---- SSL certificates ----
    SSLEngine on
    SSLCertificateFile      /etc/httpd/certs/server.pem
    SSLCertificateKeyFile   /etc/httpd/certs/server.key
    SSLCACertificateFile    /etc/httpd/certs/server.ca

    # ---- Modern SSL settings ----
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off
    Header always set Strict-Transport-Security "max-age=63072000"

    # ---- CGI – ZIP download handler ----
    ScriptAlias /cgi-bin/ /var/www/cgi-bin/

    <Directory /var/www/cgi-bin>
        AllowOverride None
        Require all granted
        Options +ExecCGI
        AddHandler cgi-script .cgi
    </Directory>

    # ---- Archive – served directly from /opt, no file copying ----
    # Alias MUST be defined before the DocumentRoot Directory block
    # to take priority over any /archive path MkDocs might generate
    Alias /archive /opt/github-mirror/archive

    <Directory /opt/github-mirror/archive>
        AllowOverride None
        Require all granted
        Options +Indexes
        IndexOptions FancyIndexing FoldersFirst NameWidth=* DescriptionWidth=*
        IndexOrderDefault Descending Date
        AddType application/x-tar .gz
        Header set Content-Disposition "attachment"
    </Directory>

    # ---- MkDocs static site ----
    <Directory /var/www/html/docs>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    ErrorLog  /var/log/httpd/github-mirror-error.log
    CustomLog /var/log/httpd/github-mirror-access.log combined
</VirtualHost>
